version: '3.8'
services:
  device-sync:
    build: .
    container_name: device-sync
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Copenhagen
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
