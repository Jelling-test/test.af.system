# INPUT: MQTT → læs Zigbee2MQTT topics
[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["zigbee2mqtt/+","z2m_a/+","z2m_b/+","z2m_c/+","z2m_d/+","z2m_e/+","z2m_f/+"]
  qos = 1
  persistent_session = true
  client_id = "telegraf-bridge-test"
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  data_format = "json"
  topic_tag = "topic"
  name_override = "meter_readings"

# Ekstra: udtræk meter_id fra topic (sidste segment)
[[processors.regex]]
  namepass = ["meter_readings"]
  [[processors.regex.tags]]
    key = "topic"
    pattern = ".*/([^/]+)$"
    replacement = "${1}"
    result_key = "meter_id"

# OUTPUT: skriv til fil (for test)
[[outputs.file]]
  files = ["/var/log/telegraf/metrics.json"]
  rotation_interval = "1h"
  data_format = "json"
