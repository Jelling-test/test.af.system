homeassistant:
  enabled: true
  retain: true
# Availability konfiguration - begræns til 2 ping forsøg
availability:
  enabled: true
  active:
    timeout: 10              # Første ping efter 10 min uden besked
    max_jitter: 30000        # Jitter for at undgå samtidige pings
    backoff: true            # Aktivér eksponentiel backoff
    pause_on_backoff_gt: 15  # STOP pinging efter 15 min = ca. 2 forsøg
  passive:
    timeout: 1500            # Batteri-enheder: 25 timer
